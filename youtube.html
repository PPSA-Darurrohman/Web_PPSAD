<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f9fa;
}

/* HERO */
.hero {
  padding: 100px 20px 70px;
  text-align: center;
  background: linear-gradient(135deg, #800101, #ff6b6b);
  color: white;
}

.hero h1 {
  font-size: 40px;
  font-weight: 600;
}

.hero p {
  font-size: 16px;
  opacity: 0.9;
}

/* SECTION */
.section {
  padding: 50px 15px;
}

/* CARD */
.youtube-card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,0.07);
  transition: 0.3s;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.youtube-card:hover {
  transform: translateY(-5px);
}

/* THUMB */
.youtube-thumb {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* BODY */
.youtube-body {
  padding: 15px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.youtube-body h5 {
  margin: 0;
  font-weight: 600;
}

.youtube-body p {
  font-size: 14px;
  color: #666;
  margin: 5px 0 15px;
}

/* BUTTON */
.btn-yt {
  margin-top: auto;
  width: 100%;
  border-radius: 8px;
}

/* RESPONSIVE */

/* Tablet */
@media (max-width: 992px) {
  .hero h1 {
    font-size: 32px;
  }

  .youtube-thumb {
    height: 180px;
  }
}

/* HP */
@media (max-width: 576px) {
  .hero {
    padding: 80px 15px 50px;
  }

  .hero h1 {
    font-size: 26px;
  }

  .hero p {
    font-size: 14px;
  }

  .youtube-thumb {
    height: 160px;
  }
}.btn-red {
  background: linear-gradient(45deg, #800101, #ff6b6b);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  box-shadow: 0 0 15px #ec489999;
  transition: 0.3s;
}

.btn-red:hover {
  transform: scale(1.05);
}footer {
  background: linear-gradient(45deg, #800101, #ff6b6b);
  color: white;
  text-align: center;
  padding: 25px;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 data-aos="fade-down">Media YouTube</h1>
    <p data-aos="fade-up">Ikuti kegiatan kami lewat channel resmi</p>
  </div>
</section>

<!-- CHANNEL LIST -->
<section class="section">
  <div class="container">
    <div class="row g-4">

      <!-- Channel 1 -->
      <div class="col-lg-6 col-md-6 col-12" data-aos="fade-up">
        <div class="youtube-card">
          <img src="assets/img/Logo/logo.png" class="youtube-thumb">
          <div class="youtube-body">
            <h5>Channel Pondok Putra</h5>
            <p>Kegiatan resmi pondok putra</p>
            <a href="https://www.youtube.com/@Ponpessadarputra" target="_blank" class="btn btn-red btn-yt">Kunjungi</a>
          </div>
        </div>
      </div>

      <!-- Channel 2 -->
      <div class="col-lg-6 col-md-6 col-12" data-aos="fade-up" data-aos-delay="100">
        <div class="youtube-card">
          <img src="assets/img/Logo/logo.png" class="youtube-thumb">
          <div class="youtube-body">
            <h5>Channel Pondok Putri</h5>
            <p>Kegiatan resmi pondok putri</p>
            <a href="https://www.youtube.com/@Ponpessadarputri" target="_blank" class="btn btn-red btn-yt">Kunjungi</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center p-5 footer text-white">
  © 2026 Pondok Pesantren Sentono Agung Darurrohman
</footer>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
  duration: 800,
  once: true
});
</script>

</body>
</html>
