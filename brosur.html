<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brosur Pesantren</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f9fa;
}

/* HERO */
.hero {
  padding: 100px 20px 70px;
  text-align: center;
  background: linear-gradient(135deg, #153386, #8bb9ff);
  color: white;
}

.hero h1 {
  font-size: 40px;
  font-weight: 600;
}

.hero p {
  font-size: 16px;
}

/* SECTION */
.section {
  padding: 50px 15px;
}

/* CARD */
.brosur-card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,0.07);
  transition: 0.3s;
  height: 100%;
}

.brosur-card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.brosur-img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* BODY */
.brosur-body {
  padding: 20px;
}

/* BUTTON */
.btn-download {
  width: 100%;
  background: #242daf;
  color: white;
  border-radius: 8px;
}.btn-download:hover {
  background: linear-gradient(45deg, #153386, #8bb9ff);
}.btn-download {
  transition: 0.3s;
}.btn-bilu {
  background: linear-gradient(45deg, #063274, #5786eb);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  box-shadow: 0 0 15px #ec489999;
  transition: 0.3s;
}

/* PDF PREVIEW */
.pdf-frame {
  width: 100%;
  height: 500px;
  border: none;
  border-radius: 10px;
}

/* RESPONSIVE BREAKPOINTS */

/* Tablet */
@media (max-width: 992px) {
  .hero h1 {
    font-size: 32px;
  }

  .brosur-img {
    height: 220px;
  }
}

/* HP */
@media (max-width: 576px) {
  .hero {
    padding: 80px 15px 50px;
  }

  .hero h1 {
    font-size: 26px;
  }

  .hero p {
    font-size: 14px;
  }

  .brosur-img {
    height: 200px;
  }

  .pdf-frame {
    height: 350px;
  }
}footer {
  background: linear-gradient(45deg, #153386, #8bb9ff);
  color: white;
  text-align: center;
  padding: 25px;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 data-aos="fade-down">Brosur Pendaftaran Santri Baru</h1>
    <p data-aos="fade-up">Informasi lengkap penerimaan santri baru</p>
  </div>
</section>

<!-- BROSUR -->
<section class="section">
  <div class="container">
    <div class="row g-4">

      <!-- PUTRA -->
      <div class="col-lg-6 col-md-6 col-12" data-aos="fade-up">
        <div class="brosur-card">
          <img src="assets/Brosur/Brosur Depan.jpg.jpeg" class="brosur-img">
          <div class="brosur-body">
            <h5>Brosur Depan</h5>
            <p>Informasi lengkap pendaftaran santri baru</p>
            <a href="assets/Brosur/Brosur Depan.jpg.jpeg" target="_blank" class="btn btn-bilu btn-download">Download</a>
          </div>
        </div>
      </div>

      <!-- PUTRI -->
      <div class="col-lg-6 col-md-6 col-12" data-aos="fade-up" data-aos-delay="100">
        <div class="brosur-card">
          <img src="assets/Brosur/Brosur Belakang.jpg.jpeg" class="brosur-img">
          <div class="brosur-body">
            <h5>Brosur Belakang</h5>
            <p>Informasi lengkap pendaftaran santri baru</p>
            <a href="assets/Brosur/Brosur Belakang.jpg.jpeg" target="_blank" class="btn btn-bilu btn-download">Download</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center p-5 footer text-white">
  © 2026 Pondok Pesantren Sentono Agung Darurrohman
</footer>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
  duration: 800,
  once: true
});
AOS.refresh();
</script>


</body>
</html>
