<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#000a35,#1f3cbb,#84a4fa);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  color:white;
}

h2{text-align:center;margin-bottom:15px;}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:.3s;
}
button:hover{transform:scale(1.03);}
button:active{transform:scale(0.97);}

/* LOADING */
.loading{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
.hidden{display:none!important;}

.spinner{
  width:50px;height:50px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00c6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* POPUP */
.popup{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup-box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:90%;
  max-width:320px;
  box-shadow:0 0 40px rgba(0,198,255,0.5);
}

.check{
  font-size:50px;
  color:#00ffae;
  margin-bottom:10px;
}

.action-btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
  font-weight:500;
}

.pdf{background:#00ffae;color:#000;}
.wa{background:#25D366;color:white;}
</style>
</head>

<body>

<div class="container">
<h2>Form Pendaftaran</h2>

<form id="formSantri">

<input name="nama" placeholder="Nama Santri" required>
<input name="wali" placeholder="Nama Wali" required>

<input name="kk" placeholder="No KK" required maxlength="16" pattern="\d{16}" inputmode="numeric">

<input name="nik" placeholder="NIK (16 digit)" required maxlength="16" pattern="\d{16}" inputmode="numeric">

<input name="tempat_lahir" placeholder="Tempat Lahir" required>

<input type="date" name="tanggal_lahir" required>

<select name="jenis_kelamin" required>
<option value="">Pilih Jenis Kelamin</option>
<option value="Putra">Laki-laki</option>
<option value="Putri">Perempuan</option>
</select>

<textarea name="alamat" placeholder="Alamat"></textarea>

<button type="submit">Daftar Sekarang</button>

</form>
</div>

<div id="loading" class="loading hidden">
<div class="spinner"></div>
<p style="color:white;">Mengirim...</p>
</div>

<div id="popup" class="popup hidden">
  <div class="popup-box">

    <div class="check">✔</div>
    <h2 id="popupTitle"></h2>
    <p>Data berhasil disimpan</p>

    <div id="actionArea"></div>

  </div>
</div>

<script>
const form=document.getElementById("formSantri");
const loading=document.getElementById("loading");
const popup=document.getElementById("popup");
const btn=form.querySelector("button");
const actionArea=document.getElementById("actionArea");

const scriptURL="https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap={
Putra:"6282264929307",
Putri:"6281230109050"
};

form.addEventListener("submit",e=>{
e.preventDefault();
if(btn.disabled) return;

const data=new FormData(form);
const jk=data.get("jenis_kelamin");

let nik=(data.get("nik")||"").replace(/\s/g,'');
data.set("nik", nik);

// VALIDASI NIK
if(!/^\d{16}$/.test(nik)){
alert("NIK harus 16 digit!");
return;
}

if(/^(\d)\1{15}$/.test(nik)){
alert("NIK tidak valid!");
return;
}

if(!adminMap[jk]){
alert("Pilih jenis kelamin!");
return;
}

loading.classList.remove("hidden");
btn.disabled=true;

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams(data)
})
.then(r=>r.json())
.then(r=>{

if(r.status==="duplicate"){
alert("NIK sudah terdaftar!");
throw new Error();
}

loading.classList.add("hidden");
popup.classList.remove("hidden");

document.getElementById("popupTitle").innerText=
"Berhasil, "+data.get("nama");

actionArea.innerHTML="";

// PDF
const pdf=document.createElement("a");
pdf.href=r.pdf;
pdf.target="_blank";
pdf.innerText="📄 Download PDF";
pdf.className="action-btn pdf";

// WA
const pesan=`Pendaftaran Santri

Nama: ${data.get("nama")}
NIK: ${nik}`;

const wa=document.createElement("a");
wa.href=`https://wa.me/${adminMap[jk]}?text=${encodeURIComponent(pesan)}`;
wa.target="_blank";
wa.innerText="📲 Kirim WhatsApp";
wa.className="action-btn wa";

actionArea.appendChild(pdf);
actionArea.appendChild(wa);

form.reset();
btn.disabled=false;

})
.catch(()=>{
loading.classList.add("hidden");
btn.disabled=false;
});
});
</script>

</body>
</html>
