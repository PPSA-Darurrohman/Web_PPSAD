<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Santri Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#6ed1ff,#6357cf);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Glass Container */
.container {
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  color:#fff;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h2 { text-align:center; margin-bottom:15px; }

/* Input */
.input-group { margin-bottom:10px; }

input, select, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:14px;
}

input:focus, textarea:focus, select:focus {
  box-shadow:0 0 0 2px #00cec9;
}

/* Error */
.error {
  font-size:12px;
  color:#ff7675;
  display:none;
}

/* Button */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:linear-gradient(135deg,#00cec9,#0984e3);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover { transform:scale(1.03); }
button:disabled { opacity:0.6; cursor:not-allowed; }

/* Loading */
.loading-popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* HAPUS BOX PUTIH — LANGSUNG SPINNER */
.spinner {
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #ffffff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

/* optional teks */
.loading-text {
  margin-top:10px;
  color:#fff;
  font-size:14px;
  text-align:center;
}

@keyframes spin { to {transform:rotate(360deg);} }

/* Success */
.success {
  display:none;
  background:linear-gradient(135deg,#00b894,#00cec9);
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-bottom:10px;
  animation:fadeIn 0.5s ease, glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow:0 0 5px #00cec9; }
  to { box-shadow:0 0 15px #00cec9; }
}

</style>

</head>

<body>

<div id="loadingPopup" class="loading-popup">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <div class="loading-text">Memproses...</div>
  </div>
</div>

<div class="container">
  <h2>Pendaftaran Santri</h2>

  <div id="success" class="success">✅ Pendaftaran berhasil!</div>

  <form id="formSantri">

<div class="input-group">
  <input type="text" name="nama" placeholder="Nama Lengkap" required>
</div>

<div class="input-group">
  <input type="text" name="wali" placeholder="Nama Wali" required>
</div>

<div class="input-group">
  <input type="text" name="kk" placeholder="No KK (16 digit)" maxlength="16" required>
  <div class="error">KK harus 16 digit</div>
</div>

<div class="input-group">
  <input type="text" name="nik" placeholder="NIK (16 digit)" maxlength="16" required>
  <div class="error">NIK harus 16 digit</div>
</div>

<div class="input-group">
  <input type="text" name="tempat_lahir" placeholder="Tempat Lahir" required>
</div>

<div class="input-group">
  <label>Tanggal Lahir</label>
  <input type="date" name="tanggal_lahir" required>
</div>

<div class="input-group">
  <select name="jenis_kelamin" required>
    <option value="">Jenis Kelamin</option>
    <option value="Putra">Laki-laki</option>
    <option value="Putri">Perempuan</option>
  </select>
</div>

<div class="input-group">
  <textarea name="alamat" placeholder="Alamat" required></textarea>
</div>

<button type="submit">Daftar Sekarang</button>

  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxCN7dGgJDGOmRozLXoD0AY6P0nYsvjYjQ-GXWoF2MWPdYP9r9UMeOTC6QFenbLsVtZ4A/exec";

const form = document.getElementById("formSantri");
const btn = form.querySelector("button");

/* VALIDASI REALTIME */
form.kk.addEventListener("input", () => {
  const err = form.kk.nextElementSibling;
  err.style.display = form.kk.value.length !== 16 ? "block" : "none";
});

form.nik.addEventListener("input", () => {
  const err = form.nik.nextElementSibling;
  err.style.display = form.nik.value.length !== 16 ? "block" : "none";
});

/* SUBMIT */
form.addEventListener("submit", e => {
  e.preventDefault();

  if (form.kk.value.length !== 16) {
  form.kk.focus();
  return alert("KK harus 16 digit");
}

if (form.nik.value.length !== 16) {
  form.nik.focus();
  return alert("NIK harus 16 digit");
}
if (btn.disabled) return;

  document.getElementById("loadingPopup").style.display = "flex";

  btn.disabled = true;
  btn.innerText = "Memproses...";

 fetch(scriptURL, {
  method:"POST",
  body:new FormData(form)
})
.then(res => res.text())
.then(text => {
  let res;

  try {
    res = JSON.parse(text);
  } catch {
    throw new Error("Response bukan JSON");
  }

  const loading = document.getElementById("loadingPopup");
  loading.style.display = "none";

  if (res.status !== "success") {
    throw new Error(res.message);
  }

  document.getElementById("success").innerHTML = "✅ Pendaftaran berhasil!";
  document.getElementById("success").style.display = "block";

  const adminMap = {
    Putra:"6282264929307",
    Putri:"6281230109050"
  };
  const tgl = new Date(form.tanggal_lahir.value)
  .toLocaleDateString("id-ID");
  const pesan = `PENDAFTARAN SANTRI BARU

Nama: ${form.nama.value}
Wali: ${form.wali.value}
KK: ${form.kk.value}
NIK: ${form.nik.value}
TTL: ${form.tempat_lahir.value}, ${tgl}
Jenis: ${form.jenis_kelamin.value}
Alamat: ${form.alamat.value}`;

  setTimeout(()=>{
    window.open(`https://wa.me/${adminMap[form.jenis_kelamin.value]}?text=${encodeURIComponent(pesan)}`,"_blank");
  },1500);

  form.reset();
  btn.disabled = false;
  btn.innerText = "Daftar Sekarang";

})
.catch(err=>{
  document.getElementById("loadingPopup").style.display = "none";
  btn.disabled = false;
  btn.innerText = "Daftar Sekarang";

  document.getElementById("success").innerHTML = "❌ " + err.message;
  document.getElementById("success").style.display = "block";
});
});
</script>

</body>
</html>
