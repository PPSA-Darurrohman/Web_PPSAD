<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* GLOW */
body::before, body::after {
  content: '';
  position: fixed;
  width: 300px;
  height: 300px;
  filter: blur(120px);
  z-index: 0;
}

body::before {
  background: #00c6ff;
  top: -100px;
  left: -100px;
}

body::after {
  background: #ff00cc;
  bottom: -100px;
  right: -100px;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  color: white;
  z-index: 1;
  animation: fadeIn 0.8s ease;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  transition: 0.3s;
}

input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.7);
}

input:focus, select:focus, textarea:focus {
  background: rgba(255,255,255,0.3);
  box-shadow: 0 0 10px #00c6ff;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00c6ff;
}/* LOADING */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 999;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #00c6ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden {
  display: none;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
  animation: zoomIn 0.4s ease;
}

.popup-box button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
}

@keyframes zoomIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ANIMASI */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* MOBILE FIX */
@media(max-width: 500px) {
  .container {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Form Pendaftaran Santri</h2>

  <form id="formSantri">
    <!-- LOADING -->
<div id="loading" class="loading hidden">
  <div class="spinner"></div>
  <p>Mengirim data...</p>
</div>

<!-- POPUP SUCCESS -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h3>✅ Berhasil!</h3>
    <p>Data berhasil dikirim</p>
    <button onclick="tutupPopup()">Tutup</button>
  </div>
</div>
    <input name="nama" placeholder="Nama" required>
    <input name="wali" placeholder="Nama Wali" required>
    <input name="kk" placeholder="No KK" required>
    <input name="nik" placeholder="NIK" required>
    <input name="tempat_lahir" placeholder="Tempat Lahir" required>
    <input type="date" name="tanggal_lahir" required>

    <select name="jenis_kelamin" required>
      <option value="">Pilih</option>
      <option value="Putra">Laki-laki</option>
      <option value="Putri">Perempuan</option>
    </select>

    <textarea name="alamat" placeholder="Alamat"></textarea>

    <button type="submit">Daftar</button>
  </form>
</div>

<script>
const form = document.getElementById("formSantri");
const loading = document.getElementById("loading");
const popup = document.getElementById("popup");
const button = form.querySelector("button");

const scriptURL = "https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap = {
  Putra: "6282264929307",
  Putri: "6281230109050"
};

form.addEventListener("submit", function(e) {
  e.preventDefault();

  // START LOADING
  loading.classList.remove("hidden");
  button.disabled = true;
  button.innerText = "Mengirim...";

  fetch(scriptURL, {
    method: "POST",
    body: new URLSearchParams(new FormData(form))
  })
  .then(res => res.json())
  .then(res => {

    if (res.status !== "success") {
      throw new Error(res.message);
    }

    const data = new FormData(form);

    const nama = data.get("nama");
    const wali = data.get("wali");
    const kk = data.get("kk");
    const nik = data.get("nik");
    const tempat = data.get("tempat_lahir");
    const tanggal = data.get("tanggal_lahir");
    const jk = data.get("jenis_kelamin");
    const alamat = data.get("alamat");

    const tgl = new Date(tanggal).toLocaleDateString("id-ID");

    const pesan = `PENDAFTARAN SANTRI BARU

Nama: ${nama}
Wali: ${wali}
KK: ${kk}
NIK: ${nik}
TTL: ${tempat}, ${tgl}
Jenis: ${jk}
Alamat: ${alamat}`;

    const noAdmin = adminMap[jk];

    // STOP LOADING
    loading.classList.add("hidden");

    // SHOW POPUP
    popup.classList.remove("hidden");

    // BUKA WA
    setTimeout(() => {
      window.open(
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(pesan)}`,
        "_blank"
      );
    }, 800);

    form.reset();
    button.disabled = false;
    button.innerText = "Daftar";

  })
  .catch(err => {
    loading.classList.add("hidden");
    button.disabled = false;
    button.innerText = "Daftar";
    alert("Error: " + err.message);
  });
});

function tutupPopup() {
  popup.classList.add("hidden");
}
</script>

</body>
</html>
