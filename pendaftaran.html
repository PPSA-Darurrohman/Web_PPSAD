<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#000a35,#1f3cbb,#84a4fa);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  color:white;
  animation:fadeIn .6s ease;
}

h2{margin-bottom:10px;text-align:center;}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

input::placeholder,textarea::placeholder{
  color:rgba(255,255,255,0.7);
}

label{
  font-size:13px;
  opacity:.8;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:.3s;
  font-weight:500;
}

button:hover{
  transform:scale(1.03);
}

/* LOADING */
.loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
.hidden{display:none!important;}

.spinner{
  width:50px;height:50px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00c6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup-box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  animation:zoom .4s ease;
  box-shadow:0 0 25px rgba(0,198,255,0.4);
}.popup-box.modern{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  padding:30px 25px;
  border-radius:25px;
  text-align:center;
  color:white;
  width:90%;
  max-width:320px;
  box-shadow:0 0 40px rgba(0,198,255,0.5);
  animation:fadeUp .5s ease;
}

.check-icon{
  font-size:55px;
  color:#00ffae;
  margin-bottom:15px;
  text-shadow:0 0 20px #00ffae;
  animation:pop .4s ease;
}

.popup-box h2{
  margin-bottom:8px;
}

.subtext{
  font-size:13px;
  opacity:0.7;
}

.divider{
  height:2px;
  width:50px;
  margin:15px auto;
  background:linear-gradient(90deg,#00c6ff,#00ffae);
  border-radius:10px;
}
button:active{
  transform:scale(0.97);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

@keyframes zoom{
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h2>Formulir Pendaftaran</h2>

<form id="formSantri">

<input name="nama" placeholder="Nama Santri" required>
<input name="wali" placeholder="Nama Wali" required>
<input name="kk" placeholder="No KK (16 digit)" required maxlength="16" pattern="\d{16}" inputmode="numeric">
<input name="nik" placeholder="NIK (16 digit)" required maxlength="16" pattern="\d{16}" inputmode="numeric">
<input name="tempat_lahir" placeholder="Tempat Lahir" required>

<label>Tanggal Lahir</label>
<input type="date" name="tanggal_lahir" required>

<select name="jenis_kelamin" required>
<option value="">Pilih Jenis Kelamin</option>
<option value="Putra">Laki-laki</option>
<option value="Putri">Perempuan</option>
</select>

<textarea name="alamat" placeholder="Alamat"></textarea>

<button type="submit">Daftar Sekarang</button>

</form>
</div>

<!-- LOADING -->
<div id="loading" class="loading hidden">
<div class="spinner"></div>
<p style="color:white;">Mengirim...</p>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box modern">

    <div class="check-icon">✔</div>

    <h2 id="popupTitle">Pendaftaran Berhasil</h2>
    <p>Data kamu sudah tersimpan dengan aman</p>

    <div class="divider"></div>

    <p class="subtext">Menghubungkan ke WhatsApp...</p>

  </div>
</div>

<script>
const form=document.getElementById("formSantri");
const loading=document.getElementById("loading");
const popup=document.getElementById("popup");
const btn=form.querySelector("button");

const scriptURL="https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap={
Putra:"6282264929307",
Putri:"6281230109050"
};

window.onload=()=>{
loading.classList.add("hidden");
popup.classList.add("hidden");
};

form.addEventListener("submit",e=>{
e.preventDefault();

const data=new FormData(form);
const jk=data.get("jenis_kelamin");

// 🔥 bersihkan NIK dari spasi
const nik=(data.get("nik")||"").replace(/\s/g,'');
data.set("nik", nik);

// 1. harus 16 digit angka
if (!/^\d{16}$/.test(nik)) {
  alert("NIK harus 16 digit angka!");
  return;
}

// 2. validasi tanggal input
const tglInputRaw = data.get("tanggal_lahir");

if (!tglInputRaw) {
  alert("Tanggal lahir wajib diisi!");
  return;
}

const [year, month, day] = tglInputRaw.split("-");
const inputTgl = new Date(year, month - 1, day);

if (isNaN(inputTgl)) {
  alert("Format tanggal lahir tidak valid!");
  return;
}

// 3. ambil data dari NIK
let tgl = parseInt(nik.substring(6,8));
let bln = parseInt(nik.substring(8,10));
let thn = parseInt(nik.substring(10,12));

// perempuan (tgl + 40)
if (tgl > 40) tgl -= 40;

// validasi dasar
if (tgl < 1 || tgl > 31 || bln < 1 || bln > 12) {
  alert("NIK tidak valid (NIK tidak sesuai)");
  return;
}

// 4. konversi tahun
let tahunFull = thn > 30 ? 1900 + thn : 2000 + thn;

// 5. cocokkan dengan input
if (
  inputTgl.getDate() !== tgl ||
  (inputTgl.getMonth()+1) !== bln ||
  inputTgl.getFullYear() !== tahunFull
) {
  alert("Tanggal lahir tidak sesuai dengan NIK!");
  return;
}

// =========================

if(!adminMap[jk]){
alert("Pilih jenis kelamin dulu!");
return;
}

// mapping tampilan
const jkText = jk === "Putra" ? "Laki-laki" : "Perempuan";

// loading
loading.classList.remove("hidden");
btn.disabled=true;
btn.innerText="Mengirim...";

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams(data)
})
.then(r=>r.json())
.then(r=>{

if (r.status === "duplicate") {
  loading.classList.add("hidden");
  btn.disabled = false;
  btn.innerText = "Daftar Sekarang";
  alert("❌ NIK sudah terdaftar!");
  return;
}

if (r.status !== "success") {
  throw new Error("Gagal kirim");
}

loading.classList.add("hidden");
popup.classList.remove("hidden");

// 🔥 tampilkan nama di popup
document.getElementById("popupTitle").innerText =
  "Berhasil, " + data.get("nama");

// format WA
const pesan=` *Pendaftaran Santri*

Nama: ${data.get("nama")}
Wali: ${data.get("wali")}
KK: ${data.get("kk")}
NIK: ${nik}
TTL: ${data.get("tempat_lahir")}, ${inputTgl.toLocaleDateString("id-ID")}
Jenis: ${jkText}
Alamat: ${data.get("alamat")}`;

// animasi teks
setTimeout(()=>{
  popup.querySelector("h2").innerText = "Mengalihkan...";
},800);
setTimeout(()=>{

  popup.classList.add("hidden");

  window.open(
`https://wa.me/${adminMap[jk]}?text=${encodeURIComponent(pesan)}`,
'_blank'
);
  form.reset();
  btn.disabled=false;
  btn.innerText="Daftar Sekarang";

},1500);
})
.catch(err=>{
loading.classList.add("hidden");
btn.disabled=false;
btn.innerText="Daftar Sekarang";
alert("Error: "+err.message);
});
});
</script>

</body>
</html>
