<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CONTAINER */
.container {
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  color:white;
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}

/* LOADING */
.loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
.hidden{ display:none; }

.spinner{
  width:50px;height:50px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00c6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{ to{transform:rotate(360deg);} }

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup-box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  animation:zoom .4s ease;
}

@keyframes zoom{
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h2>Form Pendaftaran</h2>

<form id="formSantri">
<input name="nama" placeholder="Nama" required>
<input name="wali" placeholder="Nama Wali" required>
<input name="kk" placeholder="No KK" required>
<input name="nik" placeholder="NIK" required>
<input name="tempat_lahir" placeholder="Tempat Lahir" required>
<input type="date" name="tanggal_lahir" required>

<select name="jenis_kelamin" required>
<option value="">Pilih</option>
<option value="Putra">Laki-laki</option>
<option value="Putri">Perempuan</option>
</select>

<textarea name="alamat" placeholder="Alamat"></textarea>

<button type="submit">Daftar</button>
</form>
</div>

<!-- PINDAHKAN KE SINI (LUAR FORM) -->
<div id="loading" class="loading hidden">
<div class="spinner"></div>
<p style="color:white;">Mengirim...</p>
</div>

<div id="popup" class="popup hidden">
<div class="popup-box">
<h3>✅ Berhasil</h3>
<p>Data terkirim</p>
<button onclick="tutupPopup()">Tutup</button>
</div>
</div>

<script>
const form=document.getElementById("formSantri");
const loading=document.getElementById("loading");
const popup=document.getElementById("popup");
const btn=form.querySelector("button");

const scriptURL="https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap={
Putra:"6282264929307",
Putri:"6281230109050"
};

form.addEventListener("submit",e=>{
e.preventDefault();

const data=new FormData(form);
const jk=data.get("jenis_kelamin");

if(!adminMap[jk]){
alert("Pilih jenis kelamin dulu!");
return;
}

loading.classList.remove("hidden");
btn.disabled=true;

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams(data)
})
.then(r=>r.json())
.then(r=>{

loading.classList.add("hidden");
popup.classList.remove("hidden");

const pesan=`Pendaftaran Santri

Nama: ${data.get("nama")}
Wali: ${data.get("wali")}
KK: ${data.get("kk")}
NIK: ${data.get("nik")}
TTL: ${data.get("tempat_lahir")}, ${new Date(data.get("tanggal_lahir")).toLocaleDateString("id-ID")}
Jenis: ${jk}
Alamat: ${data.get("alamat")}`;

setTimeout(()=>{
window.open(`https://wa.me/${adminMap[jk]}?text=${encodeURIComponent(pesan)}`,'_blank');
},700);

form.reset();
btn.disabled=false;

})
.catch(err=>{
loading.classList.add("hidden");
btn.disabled=false;
alert("Error: "+err.message);
});
});

function tutupPopup(){
popup.classList.add("hidden");
}
</script>

</body>
</html>
