<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Pendaftaran</title>
</head>
<body>

<h2>Form Pendaftaran Santri</h2>

<form id="formSantri">
  <input name="nama" placeholder="Nama" required><br><br>
  <input name="wali" placeholder="Nama Wali" required><br><br>
  <input name="kk" placeholder="No KK" required><br><br>
  <input name="nik" placeholder="NIK" required><br><br>
  <input name="tempat_lahir" placeholder="Tempat Lahir" required><br><br>
  <input type="date" name="tanggal_lahir" required><br><br>

  <select name="jenis_kelamin" required>
    <option value="">Pilih</option>
    <option value="Putra">Laki laki</option>
    <option value="Putri">PuPerempuan</option>
  </select><br><br>

  <textarea name="alamat" placeholder="Alamat"></textarea><br><br>

  <button type="submit">Daftar</button>
</form>

<script>
const form = document.getElementById("formSantri");

const scriptURL = "https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap = {
  Putra: "6282264929307",
  Putri: "6281230109050"
};

form.addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: new URLSearchParams(new FormData(form))
  })
  .then(res => res.json())
  .then(res => {

    if (res.status !== "success") {
      throw new Error(res.message);
    }

    // ✅ Ambil data form
    const data = new FormData(form);

    const nama = data.get("nama");
    const wali = data.get("wali");
    const kk = data.get("kk");
    const nik = data.get("nik");
    const tempat = data.get("tempat_lahir");
    const tanggal = data.get("tanggal_lahir");
    const jk = data.get("jenis_kelamin");
    const alamat = data.get("alamat");

    // ✅ Format tanggal Indonesia
    const tgl = new Date(tanggal).toLocaleDateString("id-ID");

    // ✅ Pesan WhatsApp
    const pesan = `PENDAFTARAN SANTRI BARU

Nama: ${nama}
Wali: ${wali}
KK: ${kk}
NIK: ${nik}
TTL: ${tempat}, ${tgl}
Jenis: ${jk}
Alamat: ${alamat}`;

    const noAdmin = adminMap[jk];

    if (!noAdmin) {
      alert("Nomor admin tidak ditemukan");
      return;
    }

    // ✅ Buka WhatsApp
    window.open(
      `https://wa.me/${noAdmin}?text=${encodeURIComponent(pesan)}`,
      "_blank"
    );

    alert("Pendaftaran berhasil!");
    form.reset();

  })
  .catch(err => {
    alert("Error: " + err.message);
  });
});
</script>

</body>
</html>
