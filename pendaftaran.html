<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CONTAINER */
.container {
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  color:white;
  animation:fadeIn .6s ease;
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

input::placeholder, textarea::placeholder{
  color:rgba(255,255,255,0.7);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.03);
}

/* LOADING */
.loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
.hidden{ display:none !important; }

.spinner{
  width:50px;height:50px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00c6ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{ to{transform:rotate(360deg);} }

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup-box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  animation:zoom .4s ease;
  box-shadow:0 0 25px rgba(0,198,255,0.4);
}

@keyframes zoom{
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h2>Form Pendaftaran</h2>

<form id="formSantri">
<input name="nama" placeholder="Nama" required>
<input name="wali" placeholder="Nama Wali" required>
<input name="kk" placeholder="No KK" required>
<input name="nik" placeholder="NIK" required>
<input name="tempat_lahir" placeholder="Tempat Lahir" required>
<input type="date" name="tanggal_lahir" required>

<select name="jenis_kelamin" required>
<option value="">Pilih</option>
<option value="Putra">Laki-laki</option>
<option value="Putri">Perempuan</option>
</select>

<textarea name="alamat" placeholder="Alamat"></textarea>

<button type="submit">Daftar</button>
</form>
</div>

<!-- LOADING -->
<div id="loading" class="loading hidden">
<div class="spinner"></div>
<p style="color:white;">Mengirim...</p>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
<div class="popup-box">
<h3>🎉 Berhasil</h3>
<p>Data terkirim</p>
</div>
</div>

<script>
const form=document.getElementById("formSantri");
const loading=document.getElementById("loading");
const popup=document.getElementById("popup");
const btn=form.querySelector("button");

const scriptURL="https://script.google.com/macros/s/AKfycbwTHLdN6zWxo-lU6p1D_v5btuezpcg9mMQrfllMYhe2zLiqM-SuKMyeeZfp7tf-K0oSXA/exec";

const adminMap={
Putra:"6282264929307",
Putri:"6281230109050"
};

// pastikan aman saat load
window.onload=()=>{
loading.classList.add("hidden");
popup.classList.add("hidden");
};

form.addEventListener("submit",e=>{
e.preventDefault();

const data=new FormData(form);
const jk=data.get("jenis_kelamin");

if(!adminMap[jk]){
alert("Pilih jenis kelamin dulu!");
return;
}

// START
loading.classList.remove("hidden");
btn.disabled=true;
btn.innerText="Mengirim...";

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams(data)
})
.then(r=>r.json())
.then(r=>{

if(r.status!=="success"){
throw new Error("Gagal kirim");
}

// STOP LOADING
loading.classList.add("hidden");

// SHOW POPUP
popup.classList.remove("hidden");

// FORMAT PESAN
const pesan=`Pendaftaran Santri

Nama: ${data.get("nama")}
Wali: ${data.get("wali")}
KK: ${data.get("kk")}
NIK: ${data.get("nik")}
TTL: ${data.get("tempat_lahir")}, ${new Date(data.get("tanggal_lahir")).toLocaleDateString("id-ID")}
Jenis: ${jk}
Alamat: ${data.get("alamat")}`;

// AUTO WA + CLOSE POPUP
setTimeout(()=>{
popup.classList.add("hidden");

window.open(
`https://wa.me/${adminMap[jk]}?text=${encodeURIComponent(pesan)}`,
'_blank'
);

},1500);

// RESET
form.reset();
btn.disabled=false;
btn.innerText="Daftar";

})
.catch(err=>{
loading.classList.add("hidden");
btn.disabled=false;
btn.innerText="Daftar";
alert("Error: "+err.message);
});
});
</script>

</body>
</html>
