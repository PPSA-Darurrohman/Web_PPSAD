<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Santri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, rgb(110, 209, 255), rgb(99, 87, 207));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
  background: rgba(175, 174, 247, 0.15);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  color: white;
}

h2 { text-align: center; margin-bottom: 15px; }

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #0984e3;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}.loading-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loading-box {
  background: white;
  padding: 20px 30px;
  border-radius: 15px;
  text-align: center;
}

.loading-box p {
  margin-top: 10px;
  color: #333;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #0984e3;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>
<div id="loadingPopup" class="loading-popup">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Memproses pendaftaran...</p>
  </div>
</div>
<div class="container">
  <h2>Pendaftaran Santri</h2>

  <div id="notif" style="display:none; background:#00b894; padding:10px; border-radius:8px; margin-bottom:10px; text-align:center;">
    ✅ Pendaftaran berhasil!
  </div>

  <form id="formSantri">
    <input type="text" name="nama" placeholder="Nama Lengkap" required>
    <input type="text" name="wali" placeholder="Nama Wali" required>
    <input type="number" name="kk" placeholder="No KK" required>
    <input type="number" name="nik" placeholder="NIK" required>
    <input type="text" name="tempat_lahir" placeholder="Tempat Lahir" required>
    <input type="text" name="tanggal_lahir" placeholder="Tanggal Lahir" required>

    <select name="jenis_kelamin" required>
      <option value="">Jenis Kelamin</option>
      <option value="Putra">Laki-laki</option>
      <option value="Putri">Perempuan</option>
    </select>

    <textarea name="alamat" placeholder="Alamat" required></textarea>

    <button type="submit">Daftar</button>
  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxCN7dGgJDGOmRozLXoD0AY6P0nYsvjYjQ-GXWoF2MWPdYP9r9UMeOTC6QFenbLsVtZ4A/exec";

function showLoading() {
  document.getElementById("loadingPopup").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loadingPopup").style.display = "none";
}

function showNotif() {
  const notif = document.getElementById("notif");
  notif.style.display = "block";
  setTimeout(() => notif.style.display = "none", 3000);
}

document.getElementById("formSantri").addEventListener("submit", function(e) {
  e.preventDefault();
  showLoading(); // 🔥 tampilkan loading

  const form = e.target;

  const data = {
    nama: form.nama.value,
    wali: form.wali.value,
    kk: form.kk.value,
    nik: form.nik.value,
    tempat_lahir: form.tempat_lahir.value,
    tanggal_lahir: form.tanggal_lahir.value,
    jenis_kelamin: form.jenis_kelamin.value,
    alamat: form.alamat.value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => {

    hideLoading(); // 🔥 hilangkan loading
    showNotif();

    const noAdmin = data.jenis_kelamin === "Putra"
      ? "6282264929307"
      : "6281230109050";

    const pesan = `*PENDAFTARAN SANTRI BARU*
Nama: ${data.nama}
Wali: ${data.wali}
KK: ${data.kk}
NIK: ${data.nik}
TTL: ${data.tempat_lahir}, ${data.tanggal_lahir}
Jenis: ${data.jenis_kelamin}
Alamat: ${data.alamat}`;

    setTimeout(() => {
      window.location.href = `https://wa.me/${noAdmin}?text=${encodeURIComponent(pesan)}`;
    }, 1500);

    form.reset();
  }).catch(() => {
    hideLoading();
    alert("Terjadi kesalahan, coba lagi!");
  });
});
</script>

</body>
</html>
